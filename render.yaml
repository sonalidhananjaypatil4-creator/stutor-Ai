services:
  - type: web
    name: show-your-work-first
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false   # Set this manually in the Render dashboard
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: NODE_ENV
        value: production
