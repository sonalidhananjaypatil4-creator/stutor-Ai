services:
  - type: web
    name: show-your-work-first
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false   # Set this manually in the Render dashboard
      - key: OPENROUTER_MODEL
        value: google/gemini-2.5-flash
      - key: NODE_ENV
        value: production
